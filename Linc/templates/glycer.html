<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linc Glycer Pen</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #003366;
        }

        img {
            display: block;
            margin: 20px auto;
            width: 300px;
            max-width: 100%;
        }

        .details {
            font-size: 18px;
            line-height: 1.6;
        }

        .price {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background: #003366;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0055aa;
        }

        .center {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Linc Glycer Pen</h1>

    <img src="https://via.placeholder.com/300x200?text=Linc+Glycer+Pen"
         alt="Linc Glycer Pen">

    <div class="details">
        <p>
            The Linc Glycer Pen delivers a smooth writing experience with
            high-quality ink flow and a comfortable grip.
        </p>

        <h3>Features</h3>
        <ul>
            <li>Smooth gel ink technology</li>
            <li>Comfortable grip</li>
            <li>Stylish design</li>
            <li>Long-lasting ink</li>
            <li>Available in Blue, Black, and Red</li>
        </ul>

        <p class="price">Price: ₹20</p>
    </div>

    <div class="center">
        <a href="{% url 'home' %}" class="btn">← Back to Home</a>
    </div>
</div>

</body>
</html>
